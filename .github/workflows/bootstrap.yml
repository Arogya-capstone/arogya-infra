name: Bootstrap Cluster

# Triggered manually or automatically after terraform apply-prod succeeds.
# Installs: ArgoCD, Gateway API CRDs, kgateway, KEDA, pgvector.
# Then applies the ArgoCD app and optionally triggers the app CD pipeline.
#
# Required repo secrets:
#   AWS_ACCOUNT_ID, AWS_REGION    — already used by terraform.yml
#   MAIL_USERNAME, MAIL_PASSWORD  — already used by terraform.yml
#   GITOPS_DEPLOY_KEY             — SSH deploy key for arogya-gitops (already exists)
#
# After bootstrap completes, manually trigger the app CD pipeline once:
#   github.com/Arogya-capstone/arogya-app/actions → cd.yml → Run workflow → main

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to bootstrap"
        required: true
        default: "prod"
        type: choice
        options: [prod]
  workflow_call:
    inputs:
      environment:
        description: "Environment to bootstrap"
        required: false
        type: string
        default: "prod"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:          us-east-1
  EKS_CLUSTER:         arogya-prod-eks
  ARGOCD_NAMESPACE:    argocd
  KEDA_NAMESPACE:      keda
  GATEWAY_NAMESPACE:   envoy-gateway-system
  APP_NAMESPACE:       arogya-prod
  GITOPS_REPO:         Arogya-capstone/arogya-gitops
  KEDA_IRSA_ARN:       arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/arogya-prod-sa-keda

jobs:
  bootstrap:
    name: Bootstrap prod cluster
    runs-on: ubuntu-latest
    environment: prod

    steps:
      # ── 1. Credentials ───────────────────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/arogya-prod-github-actions
          aws-region: ${{ env.AWS_REGION }}

      # ── 2. Tools ─────────────────────────────────────────────────────────────
      - name: Install kubectl
        run: |
          KUBECTL_VERSION=$(curl -L -s https://dl.k8s.io/release/stable.txt)
          curl -LO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Install helm
        run: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      # ── 3. EKS kubeconfig ────────────────────────────────────────────────────
      - name: Get EKS kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      # ── 4. ArgoCD ────────────────────────────────────────────────────────────
      - name: Install ArgoCD
        run: |
          kubectl create namespace ${{ env.ARGOCD_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -n ${{ env.ARGOCD_NAMESPACE }} --server-side --force-conflicts \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
          kubectl rollout status deployment/argocd-server \
            -n ${{ env.ARGOCD_NAMESPACE }} --timeout=300s

      - name: Configure ArgoCD repo access (SSH deploy key)
        run: |
          # Write key to temp file — printf preserves actual newlines from the secret
          printf '%s' "${{ secrets.GITOPS_DEPLOY_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key

          kubectl create secret generic arogya-gitops-repo \
            --namespace ${{ env.ARGOCD_NAMESPACE }} \
            --from-literal=type=git \
            --from-literal=url="git@github.com:${{ env.GITOPS_REPO }}.git" \
            --from-file=sshPrivateKey=/tmp/ssh_key \
            --dry-run=client -o json | \
            python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          d.setdefault('metadata', {}).setdefault('labels', {})
          d['metadata']['labels']['argocd.argoproj.io/secret-type'] = 'repository'
          print(json.dumps(d))
          " | kubectl apply -f -

          rm -f /tmp/ssh_key

      # ── 5. Envoy Gateway (Gateway API implementation) ────────────────────────
      # Pinned to v1.1.2 — compatible with EKS 1.30.
      # Clean up any partial install from a newer version first (the v1.8.1 run left a
      # ValidatingAdmissionPolicy that blocks installing older CRD versions).
      - name: Install Envoy Gateway
        run: |
          # Remove the admission policy that blocks CRD version downgrades
          kubectl delete validatingadmissionpolicy \
            safe-upgrades.gateway.networking.k8s.io --ignore-not-found
          kubectl delete validatingadmissionpolicybinding \
            safe-upgrades.gateway.networking.k8s.io --ignore-not-found

          # Delete Gateway API CRDs installed at incompatible version (v1.5.x experimental)
          # Safe to delete — no Gateway resources have been created yet
          for crd in \
            backendlbpolicies.gateway.networking.k8s.io \
            backendtlspolicies.gateway.networking.k8s.io \
            gatewayclasses.gateway.networking.k8s.io \
            gateways.gateway.networking.k8s.io \
            grpcroutes.gateway.networking.k8s.io \
            httproutes.gateway.networking.k8s.io \
            referencegrants.gateway.networking.k8s.io \
            tcproutes.gateway.networking.k8s.io \
            tlsroutes.gateway.networking.k8s.io \
            udproutes.gateway.networking.k8s.io \
            listenersets.gateway.networking.k8s.io \
            xbackendtrafficpolicies.gateway.networking.x-k8s.io \
            xmeshes.gateway.networking.x-k8s.io; do
            kubectl delete crd "$crd" --ignore-not-found
          done

          # Now install the EKS-1.30-compatible version
          kubectl apply --server-side --force-conflicts \
            -f https://github.com/envoyproxy/gateway/releases/download/v1.1.2/install.yaml
          kubectl rollout status deployment/envoy-gateway \
            -n ${{ env.GATEWAY_NAMESPACE }} --timeout=300s

      # ── 6. KEDA (with IRSA) ──────────────────────────────────────────────────
      - name: Install KEDA
        run: |
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo update
          helm upgrade --install keda kedacore/keda \
            --namespace ${{ env.KEDA_NAMESPACE }} \
            --create-namespace \
            --set "serviceAccount.operator.annotations.eks\\.amazonaws\\.com/role-arn=${{ env.KEDA_IRSA_ARN }}" \
            --wait --timeout 300s

      # ── 7. pgvector on RDS ───────────────────────────────────────────────────
      - name: Enable pgvector extension on RDS
        run: |
          RDS_ENDPOINT=$(aws ssm get-parameter \
            --name /arogya/prod/rds-endpoint \
            --region ${{ env.AWS_REGION }} \
            --query Parameter.Value --output text)

          DB_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id arogya/prod/db-credentials \
            --region ${{ env.AWS_REGION }} \
            --query SecretString --output text)

          DB_PASS=$(echo "$DB_SECRET" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['password'])")

          # RDS endpoint is host:port — strip the port
          RDS_HOST="${RDS_ENDPOINT%%:*}"

          kubectl run pgvector-init \
            --image=postgres:16-alpine \
            --restart=Never \
            --namespace=default \
            --env="PGPASSWORD=$DB_PASS" \
            -- psql "postgresql://dbadmin@${RDS_HOST}:5432/arogya?sslmode=require" \
               -c "CREATE EXTENSION IF NOT EXISTS vector;"

          # Wait up to 120s for the pod to complete
          for i in $(seq 1 24); do
            STATUS=$(kubectl get pod pgvector-init -n default \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
            echo "pgvector-init status: $STATUS"
            if [ "$STATUS" = "Succeeded" ]; then
              echo "pgvector enabled successfully"
              break
            elif [ "$STATUS" = "Failed" ]; then
              kubectl logs pgvector-init -n default || true
              kubectl delete pod pgvector-init -n default --ignore-not-found
              exit 1
            fi
            sleep 5
          done
          kubectl delete pod pgvector-init -n default --ignore-not-found

      # ── 8. Apply ArgoCD Application (manifest inlined — no checkout needed) ───
      - name: Apply ArgoCD Application
        run: |
          kubectl create namespace ${{ env.APP_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f - <<'MANIFEST'
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: arogya-prod
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/Arogya-capstone/arogya-gitops
              targetRevision: main
              path: helm/arogya
              helm:
                valueFiles:
                  - ../../environments/prod/values.yaml
            destination:
              server: https://kubernetes.default.svc
              namespace: arogya-prod
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - PrunePropagationPolicy=foreground
                - ServerSideApply=true
          MANIFEST
          echo "ArgoCD application applied — will sync once images are in ECR"

      # ── 9. Summary ───────────────────────────────────────────────────────────
      - name: Bootstrap summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "## Bootstrap ${STATUS}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Notes |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ArgoCD | installed in argocd namespace |" >> $GITHUB_STEP_SUMMARY
          echo "| kgateway | installed in kgateway-system namespace |" >> $GITHUB_STEP_SUMMARY
          echo "| KEDA | installed with IRSA role |" >> $GITHUB_STEP_SUMMARY
          echo "| pgvector | CREATE EXTENSION IF NOT EXISTS vector |" >> $GITHUB_STEP_SUMMARY
          echo "| ArgoCD app | app-prod.yaml applied — syncing from gitops |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next step**: go to github.com/Arogya-capstone/arogya-app/actions → cd.yml → Run workflow → main" >> $GITHUB_STEP_SUMMARY

      - name: Send bootstrap failure email
        if: failure()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[FAILED] Arogya bootstrap prod — ${{ github.sha }}"
          to: medilinkhub.team@gmail.com
          from: Arogya Infra <medilinkhub.team@gmail.com>
          body: |
            Arogya Cluster Bootstrap — FAILED
            ──────────────────────────────────
            Environment: prod
            Actor:       ${{ github.actor }}

            One or more bootstrap steps failed. Review the logs immediately.

            View run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
