name: Terraform

on:
  pull_request:
    branches: [main, release]
    paths: ["environments/**", "modules/**"]
  push:
    branches: [main, release]
    paths: ["environments/**", "modules/**"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to apply (prod)"
        required: true
        default: "prod"

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.10.0"

jobs:
  # ── Plan (runs on every PR to develop or main) ────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        environment: [prod]
    defaults:
      run:
        working-directory: environments/${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/arogya-${{ matrix.environment }}-github-actions
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Ensure Terraform state bucket exists
        run: |
          aws s3api head-bucket --bucket ${{ secrets.TF_STATE_BUCKET }} 2>/dev/null || \
          aws s3api create-bucket --bucket ${{ secrets.TF_STATE_BUCKET }} --region ${{ secrets.AWS_REGION }} && \
          aws s3api put-bucket-versioning --bucket ${{ secrets.TF_STATE_BUCKET }} \
            --versioning-configuration Status=Enabled && \
          aws s3api put-bucket-encryption --bucket ${{ secrets.TF_STATE_BUCKET }} \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}' && \
          aws s3api put-public-access-block --bucket ${{ secrets.TF_STATE_BUCKET }} \
            --public-access-block-configuration "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Read ELB hostname from SSM
        run: |
          ELB=$(aws ssm get-parameter --name /arogya/prod/elb-hostname \
            --region ${{ secrets.AWS_REGION }} \
            --query Parameter.Value --output text 2>/dev/null || echo "pending")
          echo "TF_VAR_elb_hostname=$ELB" >> $GITHUB_ENV

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file=terraform.tfvars -out=tfplan -no-color
        continue-on-error: true


      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ── Apply Prod (manual approval required) ─────────────────────────────────
  apply-prod:
    name: Apply — prod
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    environment: prod        # ← GitHub environment with required reviewer
    defaults:
      run:
        working-directory: environments/prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/arogya-prod-github-actions
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Ensure Terraform state bucket exists
        run: |
          aws s3api head-bucket --bucket ${{ secrets.TF_STATE_BUCKET }} 2>/dev/null || \
          aws s3api create-bucket --bucket ${{ secrets.TF_STATE_BUCKET }} --region ${{ secrets.AWS_REGION }} && \
          aws s3api put-bucket-versioning --bucket ${{ secrets.TF_STATE_BUCKET }} \
            --versioning-configuration Status=Enabled && \
          aws s3api put-bucket-encryption --bucket ${{ secrets.TF_STATE_BUCKET }} \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}' && \
          aws s3api put-public-access-block --bucket ${{ secrets.TF_STATE_BUCKET }} \
            --public-access-block-configuration "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"

      - run: terraform init
      - run: terraform validate

      - name: Read ELB hostname from SSM
        run: |
          ELB=$(aws ssm get-parameter --name /arogya/prod/elb-hostname \
            --region ${{ secrets.AWS_REGION }} \
            --query Parameter.Value --output text 2>/dev/null || echo "pending")
          echo "TF_VAR_elb_hostname=$ELB" >> $GITHUB_ENV

      - run: terraform plan -var-file=terraform.tfvars -out=tfplan
      - run: terraform apply -auto-approve tfplan

      - name: Summary
        if: always()
        run: |
          echo "## ${{ job.status == 'success' && 'Prod infra applied successfully' || 'Prod infra apply FAILED' }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      - name: Send apply success email
        if: success()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[APPLIED] Arogya Terraform prod — ${{ github.sha }}"
          to: medilinkhub.team@gmail.com
          from: Arogya Infra <medilinkhub.team@gmail.com>
          body: |
            Arogya Terraform Apply — SUCCESS
            ─────────────────────────────────
            Environment: prod
            Commit:      ${{ github.sha }}
            Actor:       ${{ github.actor }}

            Infrastructure changes applied to AWS prod.

            View run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send apply failure email
        if: failure()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[FAILED] Arogya Terraform prod — ${{ github.sha }}"
          to: medilinkhub.team@gmail.com
          from: Arogya Infra <medilinkhub.team@gmail.com>
          body: |
            Arogya Terraform Apply — FAILED
            ────────────────────────────────
            Environment: prod
            Commit:      ${{ github.sha }}
            Actor:       ${{ github.actor }}

            terraform apply failed for prod. Review the logs immediately.

            View run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ── Bootstrap (runs automatically after every successful apply) ───────────
  bootstrap:
    name: Bootstrap cluster
    needs: [apply-prod]
    uses: ./.github/workflows/bootstrap.yml
    with:
      environment: prod
    secrets: inherit
